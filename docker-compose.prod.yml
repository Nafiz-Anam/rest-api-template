services:
  node-app:
    container_name: node-app-prod
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - redis
    networks:
      - node-network

  redis:
    image: redis/redis-stack-server:latest
    container_name: redis-prod
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./docker/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - node-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    profiles:
      - tools # Only start with --profile tools for GUI access

  redis-insight:
    image: redis/redisinsight:latest
    container_name: redis-insight-prod
    ports:
      - "8001:5540"
    volumes:
      - redis_insight_data:/data
    networks:
      - node-network
    depends_on:
      - redis
    profiles:
      - tools # Only start with --profile tools for GUI access

volumes:
  redis_data:
    driver: local
  redis_insight_data:
    driver: local

networks:
  node-network:
    driver: bridge
