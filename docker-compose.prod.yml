services:
  node-app:
    container_name: node-app-prod
    build: .
    command: pnpm start
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - redis
    networks:
      - node-network

  redis:
    image: redis:7-alpine
    container_name: redis-prod
    volumes:
      - redis_data:/data
    networks:
      - node-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  redis_data:
    driver: local

networks:
  node-network:
    driver: bridge
