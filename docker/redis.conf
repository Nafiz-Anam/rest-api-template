# Redis configuration for development
# Save a minimal set of changes to disk
save ""

# Disable AOF for development
appendonly no

# Set memory limit
maxmemory 256mb
maxmemory-policy allkeys-lru

# Enable logging
loglevel notice

# Set timeout for idle connections
timeout 300

# Enable TCP keepalive
tcp-keepalive 60

# Number of databases
databases 16

# Security (uncomment for production)
# requirepass your-redis-password

# Persistence (uncomment for development persistence)
# save 900 1
# save 300 10
# save 60 10000

# AOF persistence (uncomment for development persistence)
# appendonly yes
# appendfsync everysec

# Slow log configuration
slowlog-log-slower-than 10000
slowlog-max-len 128
